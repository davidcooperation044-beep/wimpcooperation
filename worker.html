<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worker Tasks - Wimpy Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="header-shell">
        <div class="header-inner">
          <div class="header-title">
            <strong>Wimpy Portal</strong>
            <span>Worker task list</span>
          </div>
          <div class="site-nav">
            <a href="index.html">Home</a>
            <a href="admin.html">Admin</a>
            <a href="affiliate.html">Affiliate</a>
            <a href="logout.html">Logout</a>
          </div>
        </div>
      </header>
      <main class="main-content">
        <section class="section-title">
          <div>
            <h2>My tasks</h2>
            <p>Assigned work only. Updates are handled through the task rows.</p>
          </div>
        </section>
        <div class="table-shell">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Status</th>
                <th>Due date</th>
                <th>Project</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Example task</td>
                <td>pending</td>
                <td>—</td>
                <td>—</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
