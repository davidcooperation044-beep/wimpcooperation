<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Worker Tasks - Wimpy Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="admin-tasks">
    <div class="page-shell">
      <header class="header-shell">
        <div class="header-inner">
          <div class="header-title">
            <strong>Wimpy Portal</strong>
            <span>Task assignment</span>
          </div>
          <div class="site-nav">
            <a href="/admin.html">Admin</a>
            <a href="/admin-applications.html">Applications</a>
            <a href="/admin-staff.html">Staff</a>
            <a href="/admin-commissions.html">Commissions</a>
            <a href="/logout.html">Logout</a>
          </div>
        </div>
      </header>
      <main class="main-content">
        <section class="section-title">
          <div>
            <h2>Worker tasks</h2>
            <p>Assign and update work for your team.</p>
          </div>
        </section>
        <div class="table-shell">
          <table>
            <thead>
              <tr>
                <th>Task</th>
                <th>Status</th>
                <th>Due date</th>
                <th>Assigned to</th>
              </tr>
            </thead>
            <tbody id="tasks-body">
              
            </tbody>
          </table>
        </div>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
