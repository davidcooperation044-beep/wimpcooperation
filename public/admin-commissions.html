<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Affiliate Commissions - Wimpy Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="header-shell">
        <div class="header-inner">
          <div class="header-title">
            <strong>Wimpy Portal</strong>
            <span>Commission management</span>
          </div>
          <div class="site-nav">
            <a href="/admin.html">Admin</a>
            <a href="/admin-applications.html">Applications</a>
            <a href="/admin-staff.html">Staff</a>
            <a href="/admin-tasks.html">Tasks</a>
            <a href="/logout.html">Logout</a>
          </div>
        </div>
      </header>
      <main class="main-content">
        <section class="section-title">
          <div>
            <h2>Affiliate commissions</h2>
            <p>Review affiliate earnings and payout status.</p>
          </div>
        </section>
        <div class="top-card-grid">
          <div class="dashboard-card">
            <h3>Pending commissions</h3>
            <p class="large-number">$0.00</p>
          </div>
          <div class="dashboard-card">
            <h3>Paid commissions</h3>
            <p class="large-number">$0.00</p>
          </div>
        </div>
        <div class="table-shell" style="margin-top: 1rem;">
          <table>
            <thead>
              <tr>
                <th>Affiliate</th>
                <th>Amount</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Jane Doe</td>
                <td>$120.00</td>
                <td>pending</td>
              </tr>
            </tbody>
          </table>
        </div>
      </main>
    </div>
  </body>
</html>
