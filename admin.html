<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Wimpy Portal</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="header-shell">
        <div class="header-inner">
          <div class="header-title">
            <strong>Wimpy Portal</strong>
            <span>Admin dashboard</span>
          </div>
          <div class="site-nav">
            <a href="index.html">Home</a>
            <a href="worker.html">Worker</a>
            <a href="affiliate.html">Affiliate</a>
            <a href="logout.html">Logout</a>
          </div>
        </div>
      </header>
      <main class="main-content">
        <section class="section-title">
          <div>
            <h2>Admin overview</h2>
            <p>Quick status for applications, staff, and affiliates.</p>
          </div>
        </section>
        <div class="top-card-grid">
          <div class="dashboard-card">
            <h3>Pending applications</h3>
            <p class="large-number">0</p>
          </div>
          <div class="dashboard-card">
            <h3>Active workers</h3>
            <p class="large-number">0</p>
          </div>
          <div class="dashboard-card">
            <h3>Active affiliates</h3>
            <p class="large-number">0</p>
          </div>
        </div>
        <div class="button-grid">
          <a class="secondary" href="admin.html">Review applications</a>
          <a class="secondary" href="admin.html">Staff directory</a>
          <a class="secondary" href="admin.html">Worker tasks</a>
          <a class="secondary" href="admin.html">Affiliate commissions</a>
        </div>
      </main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
